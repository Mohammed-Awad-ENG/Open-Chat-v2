    <script>

        (function () {
            const FNR_CIRC = 134.04; // 2π × 21.33

            const code = localStorage.getItem("roomCode") || "";
            const isPublic = code.startsWith("pub_");
            const wrap = document.getElementById("find-new-room-wrap");
            const ringWrap = document.getElementById("fnr-ring-wrap");
            const ringFg = document.getElementById("fnr-ring-fg");
            const cdEl = document.getElementById("fnr-cd");

            if (!isPublic) return; // named rooms: hide both widgets
            wrap.style.display = "flex";

            let timeLeft = 60;
            let fnrReady = false;

            const cdInterval = setInterval(() => {
                timeLeft--;
                const frac = timeLeft / 60;
                const offset = FNR_CIRC * (1 - frac);

                ringFg.style.strokeDashoffset = offset;
                cdEl.textContent = timeLeft > 0 ? timeLeft + "s" : `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="currentColor" version="1.1"
                        id="Capa_1" width="20px" height="20px" viewBox="0 0 39.499 39.499" xml:space="preserve">
